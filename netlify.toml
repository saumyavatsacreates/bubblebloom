# ─────────────────────────────────────────────────────────────
#  Bubble Bloom — Netlify Configuration
#  Single-file static site: no build step required
# ─────────────────────────────────────────────────────────────

[build]
  publish = "."         # Serve from the root (where index.html lives)
  # No build command — pure static HTML, nothing to compile

# ── Production context ────────────────────────────────────────
[context.production]
  environment = { NODE_ENV = "production" }

# ── Global HTTP headers ───────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options            = "SAMEORIGIN"

    # Stop MIME-type sniffing
    X-Content-Type-Options     = "nosniff"

    # Minimal referrer info for privacy
    Referrer-Policy            = "strict-origin-when-cross-origin"

    # Restrict browser APIs to same-origin
    Permissions-Policy         = "camera=(), microphone=(), geolocation=(), payment=()"

    # Basic XSS protection (legacy browsers)
    X-XSS-Protection           = "1; mode=block"

    # HTTPS-only for 1 year
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"

# ── HTML: always serve fresh ──────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, no-cache, must-revalidate"
    Content-Type  = "text/html; charset=UTF-8"

# ── Static assets: cache 1 year if you add images/fonts later ─
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
